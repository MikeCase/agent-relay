services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-relay-admin
    restart: unless-stopped
    ports:
      - "3003:3002"
    volumes:
      - relay-data:/data
    environment:
      - ADMIN_KEY=${ADMIN_KEY:-}
      - PORT=3002
      - HOST=0.0.0.0
      - DB_PATH=/data/relay.db

volumes:
  relay-data:
