services:
  relay:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agent-relay
    restart: unless-stopped
    logging:
      driver: journald
      options:
        tag: agent-relay
    ports:
      - "3001:3001"
    volumes:
      - relay-data:/data
    environment:
      - RELAY_AUTH_KEYS=${RELAY_AUTH_KEYS:-}
      - RELAY_AUTH_KEY=${RELAY_AUTH_KEY:-}
      - PORT=3001
      - HOST=0.0.0.0
      - DB_PATH=/data/relay.db
      - MESSAGE_TTL_DAYS=${MESSAGE_TTL_DAYS:-7}
      - MAX_PAYLOAD_BYTES=${MAX_PAYLOAD_BYTES:-1048576}

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: agent-relay-admin
    restart: unless-stopped
    depends_on:
      relay:
        condition: service_started
    ports:
      - "3003:3002"
    volumes:
      - relay-data:/data
    environment:
      - ADMIN_KEY=${ADMIN_KEY:-}
      - PORT=3002
      - HOST=0.0.0.0
      - DB_PATH=/data/relay.db

volumes:
  relay-data:
